<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Application</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body{
background:#f4f6f9;
}

.card{
border-radius:15px;
}

#answers button{
width:100%;
margin:5px 0;
}
</style>-
</head>

<body>
 <div class="container text-center mt-5" id="startPage">

<h1 class="mb-3">Frontend Quiz Application</h1>

<p class="lead">Test your HTML, CSS & JavaScript knowledge</p>

<button class="btn btn-primary btn-lg mt-3" onclick="startQuiz()">
   Start Quiz
</button>

</div>

<div class="container mt-5 d-none" id="quizPage">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">Quiz Application</h2>

<div class="d-flex justify-content-between mb-3">
<span id="questionNumber"></span>
<span id="timer">Time: 10</span>
</div>

<div class="progress mb-3">
<div class="progress-bar" id="progressBar"></div>
</div>

<h5 id="question"></h5>

<div id="answers" class="mt-3"></div>

<div class="mt-4 text-center">
<button class="btn btn-primary" onclick="nextQuestion()">Next</button>
</div>

</div>

<div class="card mt-4 p-4 text-center d-none" id="resultBox">
<h3>Your Score</h3>
<h2 id="score"></h2>
<h4 id="resultMessage"></h4>
<button class="btn btn-success mt-3" onclick="restartQuiz()">Restart</button>
</div>

</div>

<script src="./js/script.js"></script>
</body>
</html>
